            <section class="col-12 col-lg-8">
              <h1 class="home-title">Para ti</h1>

            </section>

            <!-- Columna lateral derecha -->
            <aside class="col-12 col-lg-4 home-aside">
              <!-- Actividad de tus seguidos -->
              <section class="side-card mb-4">
                <h2>Actividad de tus seguidos</h2>

                <label for="activity-filter" class="visually-hidden">
                  Filtrar actividad
                </label>

                <select
                  id="activity-filter"
                  class="form-select activity-filter"
                >
                  <option>Toda la actividad</option>
                  <option>Más reciente</option>
                  <option>Sólo historias</option>
                  <option>Sólo reseñas</option>
                </select>

                <div class="activity-item">
                  <img
                    src="../assets/users-photos/foto-perfil-valeria-m.png"
                    alt="Avatar de Valeria M."
                    class="activity-avatar"
                  />

                  <p>
                    <strong>Valeria Ma.</strong>
                    publicó una nueva obra.
                  </p>

                  <span> 2h </span>
                </div>

                <div class="activity-item">
                  <img
                    src="../assets/users-photos/foto-perfil-luna.png"
                    alt="Avatar de Luna"
                    class="activity-avatar"
                  />

                  <p>
                    <strong>Luna</strong>
                    escribió una reseña.
                  </p>

                  <span> 2h </span>
                </div>

                <button type="button" class="view-all-button">Ver todo</button>

                    class="featured-cover"
                  />

                  <div class="featured-info">
                    <h3>Luz de octubre</h3>

                    <p
                      class="review-rating"
                      aria-label="Calificación de cinco estrellas"
                    >
                      ★★★★★
                    </p>

                    <a
                      href="lectura.html?id=luz-octubre"
                      class="read-button read-button-small"
                      data-id="luz-octubre"
                      data-titulo="Luz de octubre"
                      data-autor="Valeria M."
                      data-portada="../assets/stories-covers/portada-historia-luz-de-octubre.png"
                      data-total-pages="3"
                    >
                      Leer
                    </a>
                  </div>
                </article>
              </section>
