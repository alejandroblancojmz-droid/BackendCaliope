<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Calíope</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../Styles/globales.css" />
    <link rel="stylesheet" href="../Styles/registro.css" />
     <link rel="stylesheet" href="/Styles/Logo.css">
     
   
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div
      class="flex-grow-1 d-flex align-items-center justify-content-center w-100 px-3"
    >
      <div class="card-registro container my-4">
        <div class="logo-container-center logo-caliope">
        <div class="Login-logo"></div>
      </div>

        <h2 class="text-center title-spacing">Crear cuenta</h2>

        <form id="registroForm">
          <div class="row mb-3">
            <div class="col-12 col-sm-6 mb-3 mb-sm-0">
              <h5>Nombre</h5>
              <input
                type="text"
                class="form-control"
                name="nombreU"
                minlength="2"
                maxlength="50"
                placeholder="Ingresa tu nombre"
                required
              />
            </div>
            <div class="col-12 col-sm-6">
              <h5>Apellido</h5>
              <input
                type="text"
                class="form-control"
                name="apellidoU"
                minlength="2"
                maxlength="50"
                placeholder="Ingresa tu apellido"
                required
              />
            </div>
          </div>

          <div class="mb-3">
            <h5>Dirección de correo electrónico</h5>
            <input
              type="email"
              class="form-control"
              name="correo"
              placeholder="Ingresa el correo electrónico"
              required
            />
          </div>

          <div class="mb-3">
            <h5>Nombre de usuario</h5>
            <input
              type="text"
              class="form-control"
              autocomplete="additional-name"
              name="nickname"
              placeholder="Ingresa tu nombre de usuario"
              required
            />
          </div>

          <div class="mb-3">
            <h5>Cumpleaños</h5>
            <div class="row g-2">
              <div class="col-4">
                <select class="form-select" name="mes" id="mes" required>
                  <option selected disabled value="">Mes</option>
                  <option>Enero</option>
                  <option>Febrero</option>
                  <option>Marzo</option>
                  <option>Abril</option>
                  <option>Mayo</option>
                  <option>Junio</option>
                  <option>Julio</option>
                  <option>Agosto</option>
                  <option>Septiembre</option>
                  <option>Octubre</option>
                  <option>Noviembre</option>
                  <option>Diciembre</option>
                </select>
              </div>
              <div class="col-4">
                <select class="form-select" name="dia" id="dias" required>
                  <option selected disabled value="">Día</option>
                </select>
              </div>
              <div class="col-4">
                <select class="form-select" name="anio" id="anio" required>
                  <option selected disabled value="">Año</option>
                </select>
              </div>
            </div>
          </div>

          <div class="mb-3">
            <h5>Pronombres (opcional)</h5>
            <select class="form-select" name="pronombre">
              <option selected>Pronombres (opcional)</option>
              <option>Ella</option>
              <option>Él</option>
              <option>Elle</option>
              <option>No binario</option>
              <option>No listado</option>
              <option>Prefiero no decirlo</option>
            </select>
          </div>

          <div class="row mb-3">
            <div class="col-12 col-md-6 mb-3 mb-md-0">
              <h5>Contraseña</h5>
              <input
                type="password"
                class="form-control"
                autocomplete="new-password"
                name="password"
                placeholder="Ingresa tu contraseña"
                required
              />
            </div>
            <div class="col-12 col-md-6">
              <h5>Repetir contraseña</h5>
              <input
                type="password"
                class="form-control"
                autocomplete="new-password"
                name="confirmPassword"
                placeholder="Vuelva a introducirla"
                required
              />
            </div>
          </div>

          <div class="form-check mb-4">
            <input
              class="form-check-input"
              type="checkbox"
              id="terminos"
              required
            />
            <label class="form-check-label small text-muted" for="terminos">
              He leído y acepto los
              <a href="terminos.html" target="_blank">
                Términos y Condiciones </a
              >.
            </label>
          </div>

          <button type="submit" class="btn btn-caliope-primary mb-2">
            Regístrate con un correo electrónico
          </button>

          <a href="../index.html" class="btn btn-caliope-secondary">
            Ya tengo cuenta
          </a>
        </form>
      </div>
    </div>

    <!-- Footer inferior -->
        <footer class="site-footer site-footer--bottom">
          <nav class="site-footer-links" aria-label="Enlaces informativos">
            <a href="nosotrosli.html"> Acerca de </a>

            <a href="contactanos.html"> Contáctanos </a>

            <a href="aviso-privacidad.html"> Aviso de privacidad </a>

            <a href="terminos.html"> Términos y condiciones </a>
          </nav>

          <div class="site-footer-brand">
            <a
              href="principal.html"
              class="site-footer-logo"
              aria-label="Ir a la página principal"
            >
              <div class="footer-logo"></div>
            </a>

            <p class="site-footer-copyright">Calíope © 2026</p>
          </div>
        </footer>

    <script src="../js/registro.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // Generar Días dinámicamente
      let selectDia = document.getElementById("dias");
      for (let i = 1; i <= 31; i++) {
        let opcion = document.createElement("option");
        opcion.textContent = i;
        selectDia.appendChild(opcion);
      }

      // Generar Años dinámicamente
      let selectAnio = document.getElementById("anio");
      for (let i = 2026; i >= 1950; i--) {
        let opcion = document.createElement("option");
        opcion.textContent = i;
        selectAnio.appendChild(opcion);
      }
    </script>
  </body>
</html>
