<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Caliope</title>
    
    <link rel="stylesheet" href="Styles/globales.css">
    <link rel="stylesheet" href="Styles/inicio_sesion.css">
    <link rel="stylesheet" href="Styles/Logo.css">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="logo-container-center logo-caliope">
            <div class="Login-logo"></div>
            
        </div>

        <h4 class="text-title text-center title-spacing">Iniciar sesión</h4>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="correo">Correo electrónico</label>
                <input type="email" id="correo" class="form-control" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <div class="input-with-icon">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" id="togglePassword">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="forgot-password">
                <a href="#" class="link-secondary">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn btn-primary full-width">Iniciar sesión</button>
        </form>

        <p id="mensaje" class="form-message"></p>

        <div class="register-link">
            <span class="text-secondary">¿No tienes cuenta?</span> <a href="Pages/registro.html" class="link-primary">Regístrate</a>
        </div>
    </div>

    <!-- Footer inferior -->
        <footer class="site-footer site-footer--bottom">
          <nav class="site-footer-links" aria-label="Enlaces informativos">
            <a href="Pages/nosotrosli.html"> Acerca de </a>

            <a href="Pages/contactanos.html"> Contáctanos </a>

            <a href="Pages/aviso-privacidad.html"> Aviso de privacidad </a>

            <a href="Pages/terminos.html"> Términos y condiciones </a>
          </nav>

          <div class="site-footer-brand">
            <a
              href="Pages/principal.html"
              class="site-footer-logo"
              aria-label="Ir a la página principal"
            >
              <div class="footer-logo"></div>
            </a>

            <p class="site-footer-copyright">Calíope © 2026</p>
          </div>
        </footer>
    
    <script  type="module" src="js/login.js">
    </script>

</body>
</html>
